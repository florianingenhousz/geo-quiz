<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>GéoMonde</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<style>
:root{--ink:#0f1923;--paper:#f5f0e8;--accent:#e84c3d;--gold:#c9a84c;--correct:#27ae60;--wrong:#e84c3d;--soft:#e8e2d4;--ocean:#b8d4e8;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{font-family:'DM Sans',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(circle at 15% 85%,rgba(26,74,107,.05),transparent 50%),radial-gradient(circle at 85% 15%,rgba(201,168,76,.07),transparent 50%);pointer-events:none;z-index:0;}

.screen{display:none;position:relative;z-index:10;}
.screen.active{display:flex;flex-direction:column;}

/* ── HEADER ── */
header{position:sticky;top:0;z-index:50;background:var(--paper);border-bottom:2px solid var(--ink);padding:11px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.logo{font-family:'Playfair Display',serif;font-size:22px;font-weight:900;letter-spacing:-1px;white-space:nowrap;}
.logo span{color:var(--accent);}
.hdr-right{display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.hdr-user{font-size:13px;font-weight:600;color:#555;}
.hdr-user strong{color:var(--ink);}
.hdr-pills{display:flex;gap:8px;}
.hdr-pill{background:var(--soft);border-radius:20px;padding:3px 11px;font-size:12px;font-weight:600;color:#666;white-space:nowrap;}
.hdr-pill b{color:var(--ink);}
.btn-logout{background:none;border:1.5px solid #ccc;border-radius:3px;padding:5px 12px;font-size:12px;font-weight:600;cursor:pointer;color:#777;transition:all .15s;white-space:nowrap;}
.btn-logout:hover{border-color:var(--ink);color:var(--ink);}

/* ── LOGIN ── */
#login-screen{min-height:100vh;align-items:center;justify-content:center;padding:20px;}
.login-box{background:white;border:3px solid var(--ink);border-radius:6px;padding:36px 28px;max-width:400px;width:100%;box-shadow:6px 6px 0 var(--soft);text-align:center;}
.login-title{font-family:'Playfair Display',serif;font-size:30px;font-weight:900;margin-bottom:4px;}
.login-title span{color:var(--accent);}
.login-sub{font-size:13px;color:#888;margin-bottom:28px;}
.users-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:22px;}
.user-btn{background:var(--soft);border:2px solid transparent;border-radius:4px;padding:11px 8px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;transition:all .15s;text-align:center;color:var(--ink);}
.user-btn:hover,.user-btn.selected{background:var(--ink);color:white;border-color:var(--ink);}
.user-avatar{font-size:20px;display:block;margin-bottom:3px;}
.pin-section{margin-top:4px;}
.pin-label{font-size:12px;color:#888;margin-bottom:12px;font-weight:600;}
.pin-dots{display:flex;justify-content:center;gap:10px;margin-bottom:18px;}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid #ccc;transition:all .18s;}
.pin-dot.filled{background:var(--ink);border-color:var(--ink);}
.pin-dot.error{background:var(--wrong);border-color:var(--wrong);animation:shake .3s;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;max-width:190px;margin:0 auto;}
.num-btn{background:var(--soft);border:2px solid transparent;border-radius:4px;padding:13px 8px;font-size:18px;font-weight:700;cursor:pointer;font-family:'Playfair Display',serif;color:var(--ink);transition:all .12s;}
.num-btn:hover{background:var(--ink);color:white;}
.num-btn:active{transform:scale(.93);}
.num-btn.del{font-size:14px;font-family:'DM Sans',sans-serif;}
.num-btn.empty{background:transparent;border:none;cursor:default;}
.pin-error{color:var(--wrong);font-size:13px;font-weight:600;min-height:18px;margin-top:10px;}

/* ── HOME ── */
#home-screen{min-height:calc(100vh - 58px);padding:20px 16px;gap:20px;align-items:center;}
.home-inner{width:100%;max-width:680px;display:flex;flex-direction:column;gap:18px;}
.welcome-title{font-family:'Playfair Display',serif;font-size:clamp(22px,5vw,38px);font-weight:900;line-height:1.1;}
.welcome-title em{font-style:normal;color:var(--accent);}

.card{background:white;border:3px solid var(--ink);border-radius:6px;overflow:hidden;box-shadow:4px 4px 0 var(--soft);}
.card-head{background:var(--ink);color:var(--paper);padding:11px 18px;font-family:'Playfair Display',serif;font-size:15px;font-weight:700;}
.card-body{padding:16px 18px;}

/* stats */
.stats-row{display:flex;gap:10px;}
.stat-block{flex:1;text-align:center;background:var(--soft);border-radius:4px;padding:10px 6px;}
.stat-mode{font-size:11px;color:#888;font-weight:600;margin-bottom:2px;}
.stat-pct{font-family:'Playfair Display',serif;font-size:26px;font-weight:900;line-height:1;}
.stat-pct.good{color:var(--correct);}
.stat-pct.mid{color:var(--gold);}
.stat-pct.low{color:var(--wrong);}
.stat-pct.none{color:#ccc;}
.stat-games{font-size:10px;color:#bbb;margin-top:2px;}

/* mode cards */
.modes-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.mode-card{background:var(--ink);color:var(--paper);border-radius:4px;padding:18px 12px;cursor:pointer;border:3px solid var(--ink);position:relative;overflow:hidden;transition:transform .2s,box-shadow .18s;text-align:center;}
.mode-card::before{content:'';position:absolute;inset:0;background:var(--accent);transform:translateY(100%);transition:transform .26s cubic-bezier(.4,0,.2,1);}
.mode-card:hover::before{transform:translateY(0);}
.mode-card:hover{transform:translateY(-3px);box-shadow:5px 5px 0 rgba(0,0,0,.18);}
.mode-card *{position:relative;z-index:1;}
.mode-icon{font-size:26px;display:block;margin-bottom:6px;}
.mode-name{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;}
.mode-my-pct{font-size:11px;opacity:.65;margin-top:3px;}

/* leaderboard */
.lb-tabs{display:flex;gap:4px;padding:10px 14px 0;background:var(--ink);}
.lb-tab{background:rgba(255,255,255,.12);border:none;color:rgba(255,255,255,.65);padding:5px 12px;border-radius:20px 20px 0 0;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;}
.lb-tab.active{background:var(--paper);color:var(--ink);}
.lb-table{width:100%;}
.lb-row{display:flex;align-items:center;padding:11px 18px;border-bottom:1px solid var(--soft);gap:10px;}
.lb-row:last-child{border-bottom:none;}
.lb-row.me{background:#fffbef;}
.lb-rank{font-family:'Playfair Display',serif;font-size:17px;font-weight:900;width:26px;text-align:center;flex-shrink:0;}
.lb-name{flex:1;font-weight:600;font-size:14px;}
.lb-pct{font-family:'Playfair Display',serif;font-size:20px;font-weight:900;}
.lb-games{font-size:11px;color:#bbb;margin-left:3px;}
.lb-empty{padding:22px;text-align:center;color:#bbb;font-size:14px;}
.lb-loading{padding:22px;text-align:center;color:#bbb;font-size:13px;}

/* ── GAME ── */
#game-screen{min-height:calc(100vh - 58px);padding:12px 14px;gap:10px;align-items:center;}
.game-inner{width:100%;max-width:800px;display:flex;flex-direction:column;gap:10px;}
.game-top{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.game-mode-label{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;flex:1;min-width:100px;}
.progress-wrap{display:flex;align-items:center;gap:7px;font-size:12px;color:#888;white-space:nowrap;}
.progress-bar{width:90px;height:4px;background:var(--soft);border-radius:2px;overflow:hidden;}
.progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .35s;}
.btn-back{background:none;border:2px solid var(--ink);padding:5px 13px;border-radius:3px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap;}
.btn-back:hover{background:var(--ink);color:var(--paper);}

.question-box{background:white;border:3px solid var(--ink);border-radius:4px;padding:14px 18px;box-shadow:3px 3px 0 var(--soft);}
.question-text{font-family:'Playfair Display',serif;font-size:clamp(15px,3.5vw,21px);font-weight:700;line-height:1.3;}
.question-hint{font-size:12px;color:#999;margin-top:3px;}

#map-wrap{width:100%;background:var(--ocean);border:3px solid var(--ink);border-radius:5px;overflow:hidden;box-shadow:3px 3px 0 var(--soft);}
#map-wrap svg{display:block;width:100%;height:auto;}
.country{fill:#c4dab8;stroke:white;stroke-width:.3;transition:fill .12s;}
.country.clickable{cursor:pointer;}
.country.clickable:hover{fill:#e8c84a;}
.map-loader{display:flex;align-items:center;justify-content:center;height:150px;font-size:13px;color:#888;gap:8px;}
.spinner{width:18px;height:18px;border:3px solid var(--soft);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

#flag-display{display:flex;align-items:center;justify-content:center;padding:14px;}
.flag-img{width:min(180px,55vw);height:auto;border:3px solid var(--ink);border-radius:3px;box-shadow:4px 4px 0 var(--soft);display:block;}

.answers-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.answer-btn{background:white;border:2.5px solid var(--ink);border-radius:3px;padding:12px 13px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;text-align:left;transition:background .12s,color .12s,transform .1s;line-height:1.3;display:flex;align-items:center;gap:8px;width:100%;}
.answer-btn:hover:not(:disabled){background:var(--ink);color:white;transform:translateY(-1px);}
.answer-btn.correct{background:var(--correct);border-color:var(--correct);color:white;}
.answer-btn.wrong{background:var(--wrong);border-color:var(--wrong);color:white;}
.answer-btn:disabled{cursor:default;}
.btn-num{display:inline-flex;align-items:center;justify-content:center;min-width:21px;height:21px;background:var(--ink);color:white;border-radius:50%;font-size:10px;font-weight:700;flex-shrink:0;}
.answer-btn.correct .btn-num,.answer-btn.wrong .btn-num{background:rgba(255,255,255,.3);}
.answer-btn:hover:not(:disabled) .btn-num{background:rgba(255,255,255,.25);}

.feedback-banner{width:100%;padding:12px 15px;border-radius:3px;font-weight:600;font-size:13px;display:none;align-items:flex-start;gap:8px;border:2px solid;line-height:1.4;}
.feedback-banner.show{display:flex;}
.feedback-banner.ok{background:#eafaf1;border-color:var(--correct);color:#1a7a40;}
.feedback-banner.ko{background:#fdecea;border-color:var(--wrong);color:#a02020;}

.btn-next{width:100%;background:var(--ink);color:var(--paper);border:none;border-radius:3px;padding:14px;font-family:'Playfair Display',serif;font-size:16px;font-weight:700;cursor:pointer;transition:background .15s;display:none;}
.btn-next:hover{background:var(--accent);}

/* ── RESULT ── */
#result-screen{min-height:calc(100vh - 58px);align-items:center;justify-content:center;padding:20px 16px;gap:18px;}
.result-inner{width:100%;max-width:480px;display:flex;flex-direction:column;align-items:center;gap:18px;text-align:center;}
.result-circle{width:120px;height:120px;border-radius:50%;background:var(--ink);display:flex;flex-direction:column;align-items:center;justify-content:center;border:4px solid var(--gold);box-shadow:0 0 0 8px var(--soft);}
.result-pct{font-family:'Playfair Display',serif;font-size:34px;font-weight:900;color:var(--gold);line-height:1;}
.result-lbl{font-size:10px;color:#aaa;letter-spacing:1px;}
.result-title{font-family:'Playfair Display',serif;font-size:26px;font-weight:900;}
.result-msg{font-size:14px;color:#666;line-height:1.6;}
.result-btns{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;width:100%;}
.btn-primary{background:var(--accent);color:white;border:3px solid var(--accent);padding:12px 22px;border-radius:3px;font-family:'Playfair Display',serif;font-size:15px;font-weight:700;cursor:pointer;transition:transform .15s,box-shadow .15s;flex:1;min-width:130px;}
.btn-primary:hover{transform:translateY(-2px);box-shadow:3px 3px 0 var(--ink);}
.btn-secondary{background:white;color:var(--ink);border:3px solid var(--ink);padding:12px 22px;border-radius:3px;font-family:'Playfair Display',serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .15s;flex:1;min-width:130px;}
.btn-secondary:hover{background:var(--ink);color:var(--paper);}

/* saving indicator */
.saving-msg{font-size:12px;color:#888;text-align:center;height:16px;}

.streak-badge{position:fixed;top:70px;right:14px;background:var(--gold);color:var(--ink);padding:7px 14px;border-radius:20px;font-weight:700;font-size:13px;box-shadow:3px 3px 0 var(--ink);z-index:200;opacity:0;transform:translateX(40px);transition:opacity .3s,transform .3s;pointer-events:none;}
.streak-badge.show{opacity:1;transform:translateX(0);}

/* ── RESPONSIVE ── */
@media(max-width:600px){
  header{padding:9px 12px;}
  .logo{font-size:19px;}
  .hdr-pills{display:none;}
  .hdr-user{font-size:12px;}
  .modes-grid{grid-template-columns:1fr;gap:7px;}
  .mode-card{padding:14px 14px;display:flex;align-items:center;gap:12px;text-align:left;}
  .mode-icon{margin-bottom:0;font-size:22px;}
  .stats-row{gap:7px;}
  .stat-pct{font-size:22px;}
  .lb-row{padding:9px 12px;}
  .lb-pct{font-size:17px;}
  #home-screen{padding:14px 12px;}
  .login-box{padding:24px 16px;}
  .answers-grid{grid-template-columns:1fr 1fr;gap:7px;}
  .answer-btn{font-size:13px;padding:10px 9px;}
}
@media(max-width:360px){
  .answers-grid{grid-template-columns:1fr;}
  .users-grid{grid-template-columns:1fr 1fr;}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen" class="screen active">
  <div class="login-box">
    <div class="login-title">Géo<span>Monde</span></div>
    <div class="login-sub">Choisis ton prénom puis entre ton code PIN</div>
    <div class="users-grid" id="users-grid"></div>

      <div class="pin-label" id="pin-label">Code PIN</div>

      <div class="pin-error" id="pin-error"></div>

</div>

<!-- HEADER -->

  <div class="logo">Géo<span>Monde</span></div>

    <div class="hdr-pills" id="hdr-pills"></div>
    <div class="hdr-user">Bonjour <strong id="hdr-name"></strong></div>
    <button class="btn-logout" onclick="logout()">Déco</button>
  </div>
</header>

<!-- HOME -->
<div id="home-screen" class="screen">
  <div class="home-inner">
    <div class="welcome-title">Bonjour, <em id="welcome-name"></em> 👋</div>

    <div class="card">
      <div class="card-head">📊 Mes scores</div>
      <div class="card-body">
        <div class="stats-row" id="my-stats-row">
          <div class="stat-block"><div class="stat-mode">Carte</div><div class="stat-pct none">—</div></div>
          <div class="stat-block"><div class="stat-mode">Drapeaux</div><div class="stat-pct none">—</div></div>
          <div class="stat-block"><div class="stat-mode">Capitales</div><div class="stat-pct none">—</div></div>
        </div>
      </div>
    </div>

    <div class="modes-grid">
      <div class="mode-card" onclick="startGame('map')">
        <span class="mode-icon">🗺️</span>
        <div><div class="mode-name">Carte</div><div class="mode-my-pct" id="mpct-map">Jouer</div></div>
      </div>
      <div class="mode-card" onclick="startGame('flag')">
        <span class="mode-icon">🚩</span>
        <div><div class="mode-name">Drapeaux</div><div class="mode-my-pct" id="mpct-flag">Jouer</div></div>
      </div>
      <div class="mode-card" onclick="startGame('capital')">
        <span class="mode-icon">🏛️</span>
        <div><div class="mode-name">Capitales</div><div class="mode-my-pct" id="mpct-capital">Jouer</div></div>
      </div>
    </div>

    <div class="card" style="overflow:visible">
      <div style="background:var(--ink);border-radius:3px 3px 0 0;">
        <div class="lb-tabs" id="lb-tabs">
          <button class="lb-tab active" data-tab="total" onclick="switchTab(this)">🏆 Global</button>
          <button class="lb-tab" data-tab="map" onclick="switchTab(this)">🗺️</button>
          <button class="lb-tab" data-tab="flag" onclick="switchTab(this)">🚩</button>
          <button class="lb-tab" data-tab="capital" onclick="switchTab(this)">🏛️</button>
        </div>
      </div>
      <div id="lb-body"><div class="lb-loading">Chargement…</div></div>
    </div>
  </div>
</div>

<!-- GAME -->
<div id="game-screen" class="screen">
  <div class="game-inner">
    <div class="game-top">
      <div class="game-mode-label" id="game-mode-label"></div>
      <div class="progress-wrap">
        <span id="q-counter">1/10</span>
        <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:10%"></div></div>
      </div>
      <button class="btn-back" onclick="backToHome()">← Menu</button>
    </div>
    <div class="question-box">
      <div class="question-text" id="question-text"></div>
      <div class="question-hint" id="question-hint"></div>
    </div>
    <div id="map-wrap" style="display:none">
      <div class="map-loader" id="map-loader"><div class="spinner"></div>Chargement…</div>
      <svg id="world-svg" style="display:none"></svg>
    </div>
    <div id="flag-display" style="display:none"></div>
    <div class="answers-grid" id="answers-grid"></div>
    <div class="feedback-banner" id="feedback-banner">
      <span id="fb-icon"></span><span id="fb-text"></span>
    </div>
    <button class="btn-next" id="btn-next" onclick="nextQuestion()">Question suivante →</button>
  </div>
</div>

<!-- RESULT -->
<div id="result-screen" class="screen">
  <div class="result-inner">
    <div class="result-circle">
      <div class="result-pct" id="res-pct">—</div>
      <div class="result-lbl">RÉUSSITE</div>
    </div>
    <div class="result-title" id="res-title"></div>
    <div class="result-msg"  id="res-msg"></div>
    <div class="saving-msg"  id="saving-msg">Enregistrement…</div>
    <div class="result-btns">
      <button class="btn-primary"   onclick="replayGame()">🔄 Rejouer</button>
      <button class="btn-secondary" onclick="backToHome()">← Menu</button>
    </div>
  </div>
</div>

<div class="streak-badge" id="streak-badge">🔥 ×<span id="streak-count">3</span></div>

// ══ STATE ════════════════════════════════════════════════════════════
let currentUser=null,mode='',questions=[],qIdx=0,score=0,streak=0,stTimer=null,worldTopo=null,answered=false,lbTab='total';
const $=id=>document.getElementById(id);
const shuffle=a=>{const b=[...a];for(let i=b.length-1;i>0;i--){const j=0|Math.random()*(i+1);[b[i],b[j]]=[b[j],b[i]];}return b;};
const pick=(a,n)=>shuffle(a).slice(0,n);

// ══ SCREENS ══════════════════════════════════════════════════════════
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  $(id).classList.add('active');
  $('main-header').style.display=id==='login-screen'?'none':'flex';
}

// ══ LOGIN ════════════════════════════════════════════════════════════
let selUser=null, pinStr='';

function buildLogin(){
  const g=$('users-grid'); g.innerHTML='';
  USERS.forEach(u=>{
    const b=document.createElement('button');
    b.className='user-btn';
    b.innerHTML=`<span class="user-avatar">${u.avatar}</span>${u.name}`;
    b.onclick=()=>selectUser(u,b);
    g.appendChild(b);
  });
  const np=$('numpad'); np.innerHTML='';
  [1,2,3,4,5,6,7,8,9,null,0,'⌫'].forEach(v=>{
    const b=document.createElement('button');
    if(v===null){b.className='num-btn empty';b.disabled=true;}
    else{b.className='num-btn'+(v==='⌫'?' del':'');b.textContent=v;b.onclick=()=>pinPress(String(v));}
    np.appendChild(b);
  });
}

function selectUser(u,btn){
  selUser=u; pinStr='';
  document.querySelectorAll('.user-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
  $('pin-section').style.display='block';
  $('pin-label').textContent=`Code PIN — ${u.name}`;
  $('pin-error').textContent='';
  updateDots();
}

function pinPress(v){
  if(!selUser)return;
  $('pin-error').textContent='';
  if(v==='⌫') pinStr=pinStr.slice(0,-1);
  else if(pinStr.length<4) pinStr+=v;
  updateDots();
  if(pinStr.length===4) checkPin();
}

function updateDots(){
  $('pin-dots').querySelectorAll('.pin-dot').forEach((d,i)=>{
    d.classList.toggle('filled',i<pinStr.length);
    d.classList.remove('error');
  });
}

function checkPin(){
  if(pinStr===selUser.pin){
    currentUser=selUser; pinStr='';
    enterApp();
  } else {
    $('pin-dots').querySelectorAll('.pin-dot').forEach(d=>d.classList.add('error'));
    $('pin-error').textContent='Code incorrect';
    setTimeout(()=>{pinStr='';updateDots();$('pin-error').textContent='';},900);
  }
}

async function enterApp(){
  $('hdr-name').textContent=currentUser.name;
  $('welcome-name').textContent=currentUser.name;
  showScreen('home-screen');
  await refreshHome();
}

function logout(){
  currentUser=null; selUser=null; pinStr='';
  document.querySelectorAll('.user-btn').forEach(b=>b.classList.remove('selected'));
  $('pin-section').style.display='none';
  showScreen('login-screen');
}

// ══ SCORES (Supabase) ════════════════════════════════════════════════
// Build aggregated stats from raw rows
function aggregateRows(rows){
  // returns { userName: { map:{ok,total}, flag:{ok,total}, capital:{ok,total} } }
  const agg={};
  rows.forEach(r=>{
    if(!agg[r.user_name])agg[r.user_name]={map:{ok:0,total:0},flag:{ok:0,total:0},capital:{ok:0,total:0}};
    if(agg[r.user_name][r.mode]){
      agg[r.user_name][r.mode].ok+=r.correct;
      agg[r.user_name][r.mode].total+=r.total;
    }
  });
  return agg;
}

function pct(ok,total){return total?Math.round(ok/total*100):null;}

function globalPct(userAgg){
  let ok=0,tot=0;
  ['map','flag','capital'].forEach(m=>{ok+=userAgg[m].ok;tot+=userAgg[m].total;});
  return pct(ok,tot);
}

let cachedRows=null; // cache to avoid too many fetches

async function fetchRows(){
  cachedRows=await sbSelect();
  return cachedRows;
}

// ══ HOME ═════════════════════════════════════════════════════════════
async function refreshHome(){
  $('lb-body').innerHTML='<div class="lb-loading"><div class="spinner" style="display:inline-block;margin-right:6px"></div>Chargement…</div>';
  const rows=await fetchRows();
  const agg=aggregateRows(rows);
  renderMyStats(agg);
  renderLeaderboard(agg, lbTab);
}

function renderMyStats(agg){
  if(!currentUser)return;
  const u=agg[currentUser.name]||{map:{ok:0,total:0},flag:{ok:0,total:0},capital:{ok:0,total:0}};
  const modes=[['map','🗺️ Carte'],['flag','🚩 Drapeaux'],['capital','🏛️ Capitales']];

  // stats row
  $('my-stats-row').innerHTML=modes.map(([m,label])=>{
    const p=pct(u[m].ok,u[m].total);
    const cls=p===null?'none':p>=80?'good':p>=50?'mid':'low';
    const games=Math.floor(u[m].total/10);
    return`<div class="stat-block">
      <div class="stat-mode">${label}</div>
      <div class="stat-pct ${cls}">${p!==null?p+'%':'—'}</div>
      <div class="stat-games">${games?games+' partie'+(games>1?'s':''):''}</div>
    </div>`;
  }).join('');

  // header pills
  $('hdr-pills').innerHTML=modes.map(([m,label])=>{
    const p=pct(u[m].ok,u[m].total);
    return`<div class="hdr-pill">${label.split(' ')[0]} <b>${p!==null?p+'%':'—'}</b></div>`;
  }).join('');

  // mode card sub-labels
  modes.forEach(([m])=>{
    const p=pct(u[m].ok,u[m].total);
    $(`mpct-${m}`).textContent=p!==null?`Mon score : ${p}%`:'Jouer';
  });
}

function renderLeaderboard(agg, tab){
  const medals=['🥇','🥈','🥉'];
  const rows=USERS.map(u=>{
    const ua=agg[u.name]||{map:{ok:0,total:0},flag:{ok:0,total:0},capital:{ok:0,total:0}};
    const p=tab==='total'?globalPct(ua):pct(ua[tab].ok,ua[tab].total);
    const games=tab==='total'
      ?['map','flag','capital'].reduce((s,m)=>s+Math.floor(ua[m].total/10),0)
      :Math.floor(ua[tab].total/10);
    return{name:u.name,avatar:u.avatar,p,games};
  }).filter(r=>r.p!==null).sort((a,b)=>b.p-a.p);

  if(!rows.length){
    $('lb-body').innerHTML='<div class="lb-empty">Aucun score encore — à vos marques !</div>';
    return;
  }
  $('lb-body').innerHTML=rows.map((r,i)=>{
    const isMe=currentUser&&r.name===currentUser.name;
    const medal=medals[i]||(i+1);
    return`<div class="lb-row${isMe?' me':''}">
      <div class="lb-rank">${medal}</div>
      <div class="lb-name">${r.avatar} ${r.name}${isMe?' <span style="color:#aaa;font-weight:400;font-size:12px">(moi)</span>':''}</div>
      <div style="text-align:right;display:flex;align-items:baseline;gap:4px">
        <span class="lb-pct">${r.p}%</span>
        <span class="lb-games">${r.games?r.games+'p':''}</span>
      </div>
    </div>`;
  }).join('');
}

async function switchTab(btn){
  lbTab=btn.dataset.tab;
  document.querySelectorAll('.lb-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const rows=cachedRows||await fetchRows();
  renderLeaderboard(aggregateRows(rows),lbTab);
}

// ══ GAME ═════════════════════════════════════════════════════════════
async function startGame(m){
  mode=m; qIdx=0; score=0; streak=0; answered=false;
  const sameRegion=c=>{
    const sr=COUNTRIES.filter(x=>x.id!==c.id&&x.region===c.region);
    const ot=COUNTRIES.filter(x=>x.id!==c.id&&x.region!==c.region);
    return sr.length>=3?sr:[...sr,...ot];
  };
  questions=pick(COUNTRIES,10).map(c=>({correct:c,options:shuffle([c,...pick(sameRegion(c),3)])}));
  $('game-mode-label').textContent={map:'🗺️ Carte du Monde',flag:'🚩 Drapeaux',capital:'🏛️ Capitales'}[m];
  showScreen('game-screen');
  if(m==='map'&&!worldTopo) await loadTopo();
  renderQ();
}

async function loadTopo(){
  const r=await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json');
  worldTopo=await r.json();
}

function renderQ(){
  answered=false;
  const q=questions[qIdx],tot=questions.length;
  $('q-counter').textContent=`${qIdx+1}/${tot}`;
  $('progress-fill').style.width=`${(qIdx+1)/tot*100}%`;
  $('feedback-banner').className='feedback-banner';
  $('btn-next').style.display='none';
  $('map-wrap').style.display='none';
  $('flag-display').style.display='none';
  $('answers-grid').innerHTML='';

  if(mode==='map'){
    $('question-text').innerHTML=`Trouve : <strong style="color:var(--accent)">${q.correct.name}</strong>`;
    $('question-hint').textContent='Clique directement sur la carte';
    $('map-wrap').style.display='block';
    drawMap(q);
  } else if(mode==='flag'){
    $('question-text').textContent='À quel pays appartient ce drapeau ?';
    $('question-hint').textContent='';
    $('flag-display').style.display='flex';
    $('flag-display').innerHTML=`<img class="flag-img" src="https://flagcdn.com/w160/${q.correct.flag}.png" alt="drapeau">`;
    renderBtns(q,o=>o.name);
  } else {
    $('question-text').innerHTML=`<strong>${q.correct.capital}</strong> est la capitale de…`;
    $('question-hint').textContent='';
    renderBtns(q,o=>o.name);
  }
}

function drawMap(q){
  $('map-loader').style.display='flex';
  $('world-svg').style.display='none';
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    const wrap=$('map-wrap');
    const W=wrap.clientWidth||760, H=Math.round(W*0.5);
    const svg=d3.select('#world-svg').attr('viewBox',`0 0 ${W} ${H}`);
    svg.selectAll('*').remove();
    const proj=d3.geoNaturalEarth1().scale(W/6.3).translate([W/2,H/2]);
    const pathFn=d3.geoPath().projection(proj);
    const features=topojson.feature(worldTopo,worldTopo.objects.countries).features;
    const borders=topojson.mesh(worldTopo,worldTopo.objects.countries,(a,b)=>a!==b);
    const corrNum=A3_NUM[q.correct.id];
    svg.append('rect').attr('width',W).attr('height',H).attr('fill','#b8d4e8');
    svg.selectAll('.country').data(features).join('path')
      .attr('class','country clickable').attr('fill','#c4dab8').attr('d',pathFn)
      .on('click',function(_,d){
        if(answered)return;
        const n=String(d.id).padStart(3,'0'),a3=NUM_A3[n];
        if(!a3)return;
        answered=true;
        const ok=a3===q.correct.id;
        svg.selectAll('.country').each(function(dd){
          const nn=String(dd.id).padStart(3,'0');
          if(nn===corrNum) d3.select(this).attr('fill','var(--correct)');
          else if(nn===n&&!ok) d3.select(this).attr('fill','var(--wrong)');
          d3.select(this).classed('clickable',false).style('cursor','default');
        });
        processResult(ok,q);
      });
    svg.append('path').datum(borders).attr('fill','none').attr('stroke','white').attr('stroke-width',.3).attr('d',pathFn);
    $('map-loader').style.display='none';
    $('world-svg').style.display='block';
  }));
}

function renderBtns(q,fn){
  const grid=$('answers-grid');
  q.options.forEach((opt,i)=>{
    const b=document.createElement('button');
    b.className='answer-btn';
    b.innerHTML=`<span class="btn-num">${i+1}</span><span>${fn(opt)}</span>`;
    b.addEventListener('click',()=>{
      if(answered)return;
      answered=true;
      const ok=opt.id===q.correct.id;
      grid.querySelectorAll('.answer-btn').forEach((bb,j)=>{
        bb.disabled=true;
        if(q.options[j].id===q.correct.id) bb.classList.add('correct');
      });
      if(!ok) b.classList.add('wrong');
      processResult(ok,q);
    });
    grid.appendChild(b);
  });
}

function processResult(ok,q){
  if(ok){
    score++;streak++;
    $('feedback-banner').className='feedback-banner show ok';
    $('fb-icon').textContent='✓';
    $('fb-text').textContent=streak>=3?`🔥 Série de ${streak} !`:`Correct ! ${q.correct.name} — Capitale : ${q.correct.capital}`;
    if(streak>=3)showStreak(streak);
  } else {
    streak=0;
    $('feedback-banner').className='feedback-banner show ko';
    $('fb-icon').textContent='✗';
    $('fb-text').textContent=`C'était : ${q.correct.name} (${q.correct.capital})`;
  }
  $('btn-next').style.display='block';
  $('btn-next').textContent=qIdx<questions.length-1?'Question suivante →':'Voir les résultats →';
}

function nextQuestion(){qIdx++;qIdx>=questions.length?showResults():renderQ();}

function showStreak(n){
  clearTimeout(stTimer);$('streak-count').textContent=n;
  const b=$('streak-badge');b.classList.add('show');
  stTimer=setTimeout(()=>b.classList.remove('show'),2200);
}

async function showResults(){
  showScreen('result-screen');
  const p=Math.round(score/10*100);
  $('res-pct').textContent=p+'%';
  const[,t,msg]=[[100,"Parfait ! 🏆","Score parfait !"],[80,"Excellent ! 🌟","Très bon résultat."],[60,"Bien joué ! 👍","Continue à t'entraîner."],[40,"À améliorer 📚","Rejoue pour progresser."],[0,"Courage ! 💪","Chaque essai compte !"]].find(([min])=>p>=min);
  $('res-title').textContent=t;
  $('res-msg').textContent=`${score}/10 bonnes réponses. ${msg}`;
  $('saving-msg').textContent='Enregistrement du score…';

  const ok=await sbInsert({user_name:currentUser.name,mode,correct:score,total:10});
  $('saving-msg').textContent=ok?'✓ Score enregistré':'⚠️ Erreur réseau, score non sauvegardé';
  cachedRows=null; // invalidate cache
}

function backToHome(){showScreen('home-screen');refreshHome();}
function replayGame(){startGame(mode);}

// ══ INIT ═════════════════════════════════════════════════════════════
buildLogin();
